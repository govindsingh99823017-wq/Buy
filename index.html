<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AffiliateFlow - Cloud Powered</title>
  <!-- Tailwind + FontAwesome + Inter -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Firebase SDKs (compat version for easy Realtime DB) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #fafafc; }
    .product-card { transition: all 0.25s ease; background: white; border-radius: 1.5rem; cursor: pointer; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1); }
    .carousel-btn { background: rgba(0,0,0,0.5); transition: 0.2s; }
    .carousel-btn:hover { background: rgba(0,0,0,0.8); }
    .article-content img { max-width: 100%; border-radius: 1rem; margin: 1rem 0; }
    .badge { background: #f1f5f9; padding: 0.25rem 0.75rem; border-radius: 40px; font-size: 0.75rem; }
    .image-modal-overlay { background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); }
  </style>
</head>
<body>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10">
    <div class="flex justify-between items-center flex-wrap gap-4 mb-10">
      <div>
        <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">Affiliate<span class="text-gray-800">Flow</span></h1>
        <p class="text-gray-500 mt-1">click on product image · explore & buy</p>
      </div>
      <button id="homeBtn" class="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 px-5 py-2 rounded-full shadow-sm flex items-center gap-2"><i class="fas fa-home"></i> Home</button>
    </div>
    <div id="appRoot" class="min-h-[65vh]"></div>
  </div>

  <!-- Admin button (floating right corner) -->
  <button id="adminFloatBtn" class="fixed bottom-6 right-6 bg-indigo-700 hover:bg-indigo-800 text-white rounded-full p-4 shadow-2xl z-40 flex items-center justify-center group">
    <i class="fas fa-user-shield text-2xl"></i>
    <span class="absolute right-full mr-2 bg-gray-800 text-white text-sm px-3 py-1 rounded-full opacity-0 group-hover:opacity-100 transition">Admin Panel</span>
  </button>

  <!-- Admin Dashboard Drawer -->
  <div id="adminDashboard" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-end justify-end">
    <div class="bg-white w-full max-w-2xl h-full overflow-y-auto shadow-2xl">
      <div class="sticky top-0 bg-white border-b p-5 flex justify-between">
        <h2 class="text-2xl font-bold flex gap-2"><i class="fas fa-crown text-amber-500"></i> Admin Console</h2>
        <div><button id="logoutAdminBtn" class="text-red-500 text-sm border px-3 py-1 rounded-full">Logout</button><button id="closeAdminBtn" class="text-gray-500 text-2xl ml-2">&times;</button></div>
      </div>
      <div class="p-5">
        <button id="newProductBtn" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 mb-6"><i class="fas fa-plus-circle"></i> Add New Product</button>
        <div id="adminProductsList" class="space-y-3 max-h-[55vh] overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <!-- Product Form Modal (Add/Edit) -->
  <div id="productFormModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] hidden p-4">
    <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
      <div class="p-5 border-b flex justify-between"><h3 id="formTitle" class="text-xl font-bold">Product Details</h3><button id="closeFormBtn" class="text-2xl">&times;</button></div>
      <div class="p-6 space-y-5">
        <input type="hidden" id="productEditId">
        <div><label class="font-medium">Product Name *</label><input id="prodName" class="w-full border rounded-xl px-4 py-2.5"></div>
        <div><label class="font-medium">Short Description</label><textarea id="prodDesc" rows="2" class="w-full border rounded-xl px-4 py-2.5"></textarea></div>
        <div><label class="font-medium">Full Article (HTML) </label><textarea id="prodArticle" rows="5" class="w-full border rounded-xl px-4 py-2.5 font-mono text-sm"></textarea></div>
        <div><label class="font-medium">Affiliate Buy Link *</label><input id="prodAffLink" type="url" class="w-full border rounded-xl px-4 py-2.5" placeholder="https://example.com/product?aff=id"></div>
        <div><label class="font-medium">Gallery Images (URL or base64)</label><div id="galleryUrlsContainer" class="space-y-2"></div>
          <div class="flex gap-2 mt-2"><button type="button" id="addImageUrlBtn" class="bg-gray-100 px-4 py-2 rounded-lg text-sm"><i class="fas fa-link"></i> Add Image URL</button><button type="button" id="uploadImageBtn" class="bg-gray-100 px-4 py-2 rounded-lg text-sm"><i class="fas fa-upload"></i> Upload Photo</button><input type="file" id="hiddenFileInput" accept="image/*" class="hidden"></div>
          <p class="text-xs text-gray-400 mt-1">First image = main thumbnail.</p>
        </div>
        <div class="flex justify-end gap-3"><button id="cancelFormBtn" class="px-5 py-2 border rounded-xl">Cancel</button><button id="saveProductBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-xl shadow">Save Product</button></div>
      </div>
    </div>
  </div>

  <!-- Image Click Modal (About / Buy) -->
  <div id="imageActionModal" class="fixed inset-0 z-[70] hidden items-center justify-center image-modal-overlay" onclick="window.imageModalClose && window.imageModalClose(event)">
    <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl" onclick="event.stopPropagation()">
      <div class="flex justify-between items-start"><h3 id="modalProductName" class="text-xl font-bold">Product</h3><button id="closeImageModalBtn" class="text-gray-400 text-2xl">&times;</button></div>
      <img id="modalProductImage" class="w-full h-48 object-cover rounded-xl my-4 bg-gray-100">
      <p id="modalProductDesc" class="text-gray-600 text-sm mb-5"></p>
      <div class="flex gap-3"><button id="modalAboutBtn" class="flex-1 bg-indigo-100 text-indigo-800 py-2.5 rounded-xl font-semibold hover:bg-indigo-200"><i class="fas fa-book-open mr-2"></i> About Product</button><button id="modalBuyBtn" class="flex-1 bg-emerald-600 text-white py-2.5 rounded-xl font-semibold hover:bg-emerald-700"><i class="fas fa-shopping-cart mr-2"></i> Buy Now</button></div>
    </div>
  </div>

  <script>
    // ========== FIREBASE CONFIGURATION (YOUR PROVIDED CREDENTIALS) ==========
    const firebaseConfig = {
      apiKey: "AIzaSyBem0eHkbeMcSoxcfTe77nQ4atIYl5lVd8",
      authDomain: "prodect-buy.firebaseapp.com",
      projectId: "prodect-buy",
      storageBucket: "prodect-buy.firebasestorage.app",
      messagingSenderId: "125411558407",
      appId: "1:125411558407:web:12abfee6801f2ffc49d6a2",
      measurementId: "G-7GYSC8RZQ8"
    };
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const productsRef = db.ref('products');
    // ====================================================================

    let products = [];
    let adminAuthenticated = false;
    const ADMIN_PASSWORD = "admin123";

    // Seed default products if DB empty (only runs once globally)
    function seedDefaultProductsIfEmpty() {
      productsRef.once('value').then(snapshot => {
        if (!snapshot.exists()) {
          const defaultProducts = {
            "prod_default1": {
              id: "prod_default1",
              name: "ErgoGlide Wireless Mouse",
              description: "Ergonomic design with 4000 DPI, silent clicks, and 2-year battery. Perfect for productivity.",
              article: `<p>The <strong>ErgoGlide Mouse</strong> redefines comfort for long work sessions. Advanced optical sensor and programmable buttons.</p><img src="https://placehold.co/800x400/EEE/31343C?text=Mouse+Graph+Performance" alt="graph"><ul><li>Up to 4000 DPI</li><li>Bluetooth + 2.4GHz</li><li>USB-C charging</li></ul><p>Ideal for designers and coders.</p>`,
              affiliateLink: "https://example.com/buy/ergoglide?ref=aff123",
              gallery: ["https://placehold.co/400x300/4F46E5/white?text=ErgoGlide+Front", "https://placehold.co/400x300/818CF8/white?text=Side+View"]
            },
            "prod_default2": {
              id: "prod_default2",
              name: "AuraSound ANC Headphones",
              description: "Premium noise cancelling headphones with 40hr battery, deep bass and crystal clarity.",
              article: `<h3>Immersive audio experience</h3><p>Experience studio-grade sound with <strong>AuraSound ANC</strong>. Active noise cancellation blocks 95% ambient noise.</p><img src="https://placehold.co/700x400/1E293B/white?text=Frequency+Response+Graph" alt="frequency graph"><p>Ideal for travel and focus. Includes carrying case.</p>`,
              affiliateLink: "https://example.com/aurabuds?aff=partner",
              gallery: ["https://placehold.co/400x300/0F172A/white?text=AuraSound+Black", "https://placehold.co/400x300/334155/white?text=Soft+Case"]
            }
          };
          productsRef.set(defaultProducts);
        }
      });
    }

    // Real-time listener
    function listenToProducts() {
      productsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          products = Object.values(data);
        } else {
          products = [];
        }
        handleRouting(); // refresh current view
        if (adminAuthenticated) renderAdminProductList();
      });
    }

    // Helper: save/update/delete
    function saveProductToDB(product) {
      return productsRef.child(product.id).set(product);
    }
    function deleteProductFromDB(id) {
      return productsRef.child(id).remove();
    }

    // ---------- UI Helpers ----------
    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || ''; }
    function getProductFromId(id) { return products.find(p => p.id === id); }

    // ROUTING
    function handleRouting() {
      const params = new URLSearchParams(window.location.search);
      const prodId = params.get('product');
      if (prodId && getProductFromId(prodId)) {
        renderProductDetail(prodId);
      } else {
        renderProductList();
      }
    }

    // PRODUCT LIST (Image click  modal, no article button)
    function renderProductList() {
      const root = document.getElementById('appRoot');
      if (!products.length) {
        root.innerHTML = `<div class="text-center py-16 bg-white rounded-2xl shadow-sm"><i class="fas fa-box-open text-5xl text-gray-300 mb-4"></i><p class="text-gray-500">No products yet. Open admin panel to add your first project!</p></div>`;
        return;
      }
      const cardsHtml = products.map(prod => {
        const thumb = prod.gallery?.[0] || "https://placehold.co/400x300/DDD/333?text=No+Image";
        return `
          <div class="product-card p-5 flex flex-col border border-gray-100 shadow-sm">
            <div class="product-image-trigger cursor-pointer" data-id="${prod.id}" data-name="${escapeHtml(prod.name)}" data-desc="${escapeHtml(prod.description)}" data-thumb="${thumb}" data-afflink="${escapeHtml(prod.affiliateLink)}">
              <img src="${thumb}" class="h-56 w-full object-cover rounded-xl mb-4 bg-gray-100 transition-transform hover:scale-[1.02]" alt="${escapeHtml(prod.name)}">
            </div>
            <h3 class="text-xl font-bold text-gray-800">${escapeHtml(prod.name)}</h3>
            <p class="text-gray-500 text-sm mt-1 line-clamp-2">${escapeHtml(prod.description.substring(0, 90))}${prod.description.length>90?'...':''}</p>
            <div class="mt-4 text-xs text-indigo-400 flex items-center gap-1"><i class="fas fa-hand-pointer"></i> <span>click image  explore options</span></div>
          </div>
        `;
      }).join('');
      root.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-7">${cardsHtml}</div>`;
      attachImageTriggers();
    }

    function attachImageTriggers() {
      document.querySelectorAll('.product-image-trigger').forEach(el => {
        const id = el.dataset.id, name = el.dataset.name, desc = el.dataset.desc, thumb = el.dataset.thumb, affLink = el.dataset.afflink;
        el.addEventListener('click', () => openImageModal(id, name, desc, thumb, affLink));
      });
    }

    // Modal with About / Buy
    function openImageModal(prodId, name, desc, thumb, affLink) {
      document.getElementById('modalProductName').innerText = name;
      document.getElementById('modalProductDesc').innerText = desc.length > 120 ? desc.slice(0,120)+'...' : desc;
      document.getElementById('modalProductImage').src = thumb;
      const modal = document.getElementById('imageActionModal');
      modal.classList.remove('hidden'); modal.classList.add('flex');
      
      const aboutBtn = document.getElementById('modalAboutBtn');
      const buyBtn = document.getElementById('modalBuyBtn');
      // clone to remove old listeners
      const newAbout = aboutBtn.cloneNode(true);
      aboutBtn.parentNode.replaceChild(newAbout, aboutBtn);
      const newBuy = buyBtn.cloneNode(true);
      buyBtn.parentNode.replaceChild(newBuy, buyBtn);
      
      newAbout.addEventListener('click', () => {
        navigateToProduct(prodId);
        closeImageModal();
      });
      newBuy.addEventListener('click', () => {
        if (affLink && affLink.startsWith('http')) window.open(affLink, '_blank');
        else alert("Affiliate link not configured.");
        closeImageModal();
      });
    }
    function closeImageModal() { document.getElementById('imageActionModal').classList.add('hidden'); }
    window.imageModalClose = function(e) { if (e.target === document.getElementById('imageActionModal')) closeImageModal(); };

    function navigateToProduct(id) {
      window.history.pushState({}, '', `?product=${id}`);
      handleRouting();
    }
    function goHome() {
      window.history.pushState({}, '', window.location.pathname);
      handleRouting();
    }

    // PRODUCT DETAIL PAGE (article + buy button, no copy link, no extra share)
    function renderProductDetail(productId) {
      const product = getProductFromId(productId);
      if (!product) { goHome(); return; }
      const gallery = product.gallery || [];
      let galleryHtml = `
        <div class="relative bg-gray-100 rounded-2xl overflow-hidden mb-5" id="galleryCarousel">
          <img id="carouselMainImg" src="${gallery[0] || ''}" class="w-full h-80 object-contain bg-white p-2" alt="gallery">
          <div class="absolute inset-x-0 bottom-4 flex justify-center gap-2" id="carouselDots"></div>
          ${gallery.length>1 ? `<button id="carouselPrev" class="carousel-btn absolute left-2 top-1/2 -translate-y-1/2 text-white rounded-full p-2"><i class="fas fa-chevron-left"></i></button><button id="carouselNext" class="carousel-btn absolute right-2 top-1/2 -translate-y-1/2 text-white rounded-full p-2"><i class="fas fa-chevron-right"></i></button>` : ''}
        </div>
      `;
      const detailHtml = `
        <div class="bg-white rounded-2xl shadow-md p-6 md:p-8">
          <div class="flex flex-wrap justify-between items-start gap-4 border-b pb-4 mb-5">
            <h1 class="text-3xl font-extrabold text-gray-800">${escapeHtml(product.name)}</h1>
            <button id="backToListBtn" class="text-sm border rounded-full px-4 py-2 hover:bg-gray-50"><i class="fas fa-arrow-left"></i> Back to products</button>
          </div>
          ${galleryHtml}
          <div class="mb-4"><span class="badge text-indigo-700 bg-indigo-50"><i class="fas fa-star"></i> affiliate pick</span></div>
          <div class="article-content prose max-w-none mb-8">${product.article || '<p>No article yet. Use admin panel to add rich content.</p>'}</div>
          <div class="border-t pt-6 flex justify-center md:justify-start">
            <a href="${escapeHtml(product.affiliateLink)}" target="_blank" rel="noopener noreferrer nofollow" class="bg-emerald-600 hover:bg-emerald-700 text-white px-10 py-3 rounded-xl font-bold shadow-lg transition flex items-center gap-2"><i class="fas fa-shopping-cart"></i> Buy Now (Affiliate)</a>
          </div>
        </div>
      `;
      document.getElementById('appRoot').innerHTML = detailHtml;

      // Carousel logic
      if (gallery.length > 1) {
        let idx = 0;
        const mainImg = document.getElementById('carouselMainImg');
        const prevBtn = document.getElementById('carouselPrev');
        const nextBtn = document.getElementById('carouselNext');
        const dotsContainer = document.getElementById('carouselDots');
        if (dotsContainer) {
          dotsContainer.innerHTML = gallery.map((_, i) => `<button class="w-2.5 h-2.5 rounded-full mx-1 ${i===0 ? 'bg-indigo-600' : 'bg-gray-300'}" data-imgidx="${i}"></button>`).join('');
          dotsContainer.querySelectorAll('button').forEach((dot, i) => {
            dot.addEventListener('click', () => updateCarousel(i));
          });
        }
        const updateCarousel = (newIdx) => {
          idx = (newIdx + gallery.length) % gallery.length;
          mainImg.src = gallery[idx];
          if (dotsContainer) {
            const btns = dotsContainer.querySelectorAll('button');
            btns.forEach((btn, i) => {
              if (i === idx) btn.classList.add('bg-indigo-600');
              else btn.classList.remove('bg-indigo-600');
            });
          }
        };
        prevBtn?.addEventListener('click', () => updateCarousel(idx-1));
        nextBtn?.addEventListener('click', () => updateCarousel(idx+1));
      }
      document.getElementById('backToListBtn')?.addEventListener('click', goHome);
    }

    // ---------- ADMIN PANEL (Firebase operations) ----------
    function renderAdminProductList() {
      const container = document.getElementById('adminProductsList');
      if (!products.length) { container.innerHTML = '<div class="text-gray-400 text-center p-6 bg-gray-50 rounded-xl">No products yet. Click "Add New" to start.</div>'; return; }
      container.innerHTML = products.map(prod => `
        <div class="bg-gray-50 rounded-xl p-4 flex flex-wrap justify-between items-center gap-3 border">
          <div class="flex-1">
            <div class="font-bold flex items-center gap-2"><i class="fas fa-cube text-indigo-500"></i> ${escapeHtml(prod.name)}</div>
            <div class="text-xs text-gray-500 truncate w-64">${escapeHtml(prod.description?.substring(0,60)) || ''}</div>
            <div class="text-[11px] text-gray-400 mt-1"><i class="fas fa-link"></i> ${prod.affiliateLink?.length > 40 ? prod.affiliateLink.slice(0,40)+'...' : prod.affiliateLink}</div>
          </div>
          <div class="flex gap-2">
            <button data-id="${prod.id}" class="adminEditBtn bg-white border border-indigo-200 text-indigo-700 px-3 py-1.5 rounded-lg text-sm hover:bg-indigo-50"><i class="fas fa-edit"></i> Edit</button>
            <button data-id="${prod.id}" class="adminCopyLinkBtn bg-gray-100 border px-3 py-1.5 rounded-lg text-sm"><i class="fas fa-copy"></i> Link</button>
            <button data-id="${prod.id}" class="adminDeleteBtn bg-red-50 text-red-600 px-3 py-1.5 rounded-lg text-sm hover:bg-red-100"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.adminEditBtn').forEach(btn => btn.addEventListener('click', () => openProductForm(btn.dataset.id)));
      document.querySelectorAll('.adminCopyLinkBtn').forEach(btn => btn.addEventListener('click', () => {
        const link = `${window.location.origin}${window.location.pathname}?product=${btn.dataset.id}`;
        navigator.clipboard.writeText(link);
        alert("Product link copied to clipboard (for sharing via admin)");
      }));
      document.querySelectorAll('.adminDeleteBtn').forEach(btn => btn.addEventListener('click', async () => {
        if (confirm("Delete this product permanently?")) {
          await deleteProductFromDB(btn.dataset.id);
        }
      }));
    }

    // Product Form logic (gallery management)
    let currentGalleryUrls = [];
    function resetForm() {
      document.getElementById('productEditId').value = '';
      document.getElementById('prodName').value = '';
      document.getElementById('prodDesc').value = '';
      document.getElementById('prodArticle').value = '';
      document.getElementById('prodAffLink').value = '';
      currentGalleryUrls = [];
      renderGalleryInputs();
    }
    function renderGalleryInputs() {
      const container = document.getElementById('galleryUrlsContainer');
      if (!container) return;
      if (currentGalleryUrls.length === 0) currentGalleryUrls.push('');
      container.innerHTML = currentGalleryUrls.map((url, idx) => `
        <div class="flex gap-2 items-center">
          <input type="text" class="galleryUrlInput flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm" value="${escapeHtml(url)}" placeholder="Image URL (or base64 data)" data-index="${idx}">
          <button type="button" class="removeGalleryBtn text-red-500 p-2"><i class="fas fa-times-circle"></i></button>
        </div>
      `).join('');
      document.querySelectorAll('.galleryUrlInput').forEach(inp => {
        inp.addEventListener('change', (e) => { const idx = parseInt(inp.dataset.index); if (!isNaN(idx)) currentGalleryUrls[idx] = inp.value; });
        inp.addEventListener('input', (e) => { const idx = parseInt(inp.dataset.index); if (!isNaN(idx)) currentGalleryUrls[idx] = inp.value; });
      });
      document.querySelectorAll('.removeGalleryBtn').forEach((btn, idx) => {
        btn.addEventListener('click', () => {
          if (currentGalleryUrls.length > 1) currentGalleryUrls.splice(idx, 1);
          else currentGalleryUrls = [''];
          renderGalleryInputs();
        });
      });
    }
    function openProductForm(editId = null) {
      if (editId) {
        const prod = products.find(p => p.id === editId);
        if (prod) {
          document.getElementById('productEditId').value = prod.id;
          document.getElementById('prodName').value = prod.name;
          document.getElementById('prodDesc').value = prod.description || '';
          document.getElementById('prodArticle').value = prod.article || '';
          document.getElementById('prodAffLink').value = prod.affiliateLink || '';
          currentGalleryUrls = prod.gallery ? [...prod.gallery] : [''];
          renderGalleryInputs();
          document.getElementById('formTitle').innerHTML = '<i class="fas fa-pen-alt text-indigo-500"></i> Edit Product / Article';
        }
      } else {
        resetForm();
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-plus-circle text-indigo-500"></i> Create New Product';
      }
      document.getElementById('productFormModal').classList.remove('hidden');
    }
    async function saveProductFromForm() {
      const editId = document.getElementById('productEditId').value;
      const id = editId || (Date.now().toString(36) + Math.random().toString(36).substring(2, 6));
      const name = document.getElementById('prodName').value.trim();
      if (!name) { alert("Product name required"); return; }
      const description = document.getElementById('prodDesc').value;
      const article = document.getElementById('prodArticle').value;
      let affiliateLink = document.getElementById('prodAffLink').value.trim();
      if (!affiliateLink) { alert("Affiliate buy link is mandatory"); return; }
      if (!affiliateLink.startsWith('http')) affiliateLink = 'https://' + affiliateLink;
      let cleanGallery = currentGalleryUrls.filter(u => u && u.trim().length > 0);
      if (cleanGallery.length === 0) cleanGallery = ["https://placehold.co/400x300/DDD/333?text=Image+Missing"];
      const product = { id, name, description, article, affiliateLink, gallery: cleanGallery };
      await saveProductToDB(product);
      document.getElementById('productFormModal').classList.add('hidden');
    }

    // Admin authentication & UI
    function showAdminAuth() {
      const pwd = prompt(" Admin access required. Enter password:");
      if (pwd === ADMIN_PASSWORD) {
        adminAuthenticated = true;
        openAdminDashboard();
      } else if (pwd !== null) alert("Wrong password!");
    }
    function openAdminDashboard() {
      if (!adminAuthenticated) return showAdminAuth();
      renderAdminProductList();
      document.getElementById('adminDashboard').classList.remove('hidden');
      document.getElementById('adminDashboard').classList.add('flex');
    }
    function closeAdminDashboard() { document.getElementById('adminDashboard').classList.add('hidden'); }
    function logoutAdmin() { adminAuthenticated = false; closeAdminDashboard(); }

    // Event listeners
    document.getElementById('adminFloatBtn').onclick = () => openAdminDashboard();
    document.getElementById('closeAdminBtn').onclick = closeAdminDashboard;
    document.getElementById('logoutAdminBtn').onclick = logoutAdmin;
    document.getElementById('newProductBtn').onclick = () => openProductForm();
    document.getElementById('closeFormBtn').onclick = () => document.getElementById('productFormModal').classList.add('hidden');
    document.getElementById('cancelFormBtn').onclick = () => document.getElementById('productFormModal').classList.add('hidden');
    document.getElementById('saveProductBtn').onclick = saveProductFromForm;
    document.getElementById('addImageUrlBtn').onclick = () => { currentGalleryUrls.push(''); renderGalleryInputs(); };
    document.getElementById('uploadImageBtn').onclick = () => document.getElementById('hiddenFileInput').click();
    document.getElementById('hiddenFileInput').onchange = (e) => {
      const file = e.target.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (ev) => { currentGalleryUrls.push(ev.target.result); renderGalleryInputs(); };
        reader.readAsDataURL(file);
      }
      e.target.value = '';
    };
    document.getElementById('homeBtn').onclick = goHome;
    document.getElementById('closeImageModalBtn').onclick = closeImageModal;
    window.addEventListener('popstate', handleRouting);

    // Initialize
    seedDefaultProductsIfEmpty();
    listenToProducts();
  </script>
</body>
</html>
